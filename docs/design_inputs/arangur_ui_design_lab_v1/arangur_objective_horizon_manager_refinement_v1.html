  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;arangur-objective-manager&#x27;);
      const screens = Array.from(root.querySelectorAll(&#x27;[data-step]&#x27;));
      const prevButton = root.querySelector(&#x27;[data-prev]&#x27;);
      const nextButton = root.querySelector(&#x27;[data-next]&#x27;);
      const progress = root.querySelector(&#x27;[data-progress]&#x27;);
      const select = root.querySelector(&#x27;#arangur-manager-select&#x27;);
      const detailLine = root.querySelector(&#x27;[data-detail-line]&#x27;);
      const managers = {
        a: { name: &#x27;Manager A&#x27;, role: &#x27;Growth / AI Infrastructure&#x27;, actual: 11.60, mandate: 9.50, active: 2.10, contribution: 0.52, actualWeight: 24.86, targetWeight: 22.00, drift: 2.86 },
        b: { name: &#x27;Manager B&#x27;, role: &#x27;Core Quality Equity&#x27;, actual: 8.40, mandate: 7.60, active: 0.80, contribution: 0.15, actualWeight: 18.81, targetWeight: 19.00, drift: -0.19 },
        c: { name: &#x27;Manager C&#x27;, role: &#x27;Income and Cash Generation&#x27;, actual: 4.70, mandate: 4.30, active: 0.40, contribution: 0.05, actualWeight: 13.02, targetWeight: 17.00, drift: -3.98 },
        d: { name: &#x27;Manager D&#x27;, role: &#x27;Private Markets / Real Assets&#x27;, actual: 7.10, mandate: 6.30, active: 0.80, contribution: 0.16, actualWeight: 20.31, targetWeight: 20.00, drift: 0.31 },
        e: { name: &#x27;Manager E&#x27;, role: &#x27;Liquidity Reserve / Defensive Ballast&#x27;, actual: 3.40, mandate: 3.10, active: 0.30, contribution: 0.04, actualWeight: 14.04, targetWeight: 14.00, drift: 0.04 },
        f: { name: &#x27;Manager F&#x27;, role: &#x27;Opportunistic Macro / Hedge&#x27;, actual: 8.90, mandate: 7.50, active: 1.40, contribution: 0.13, actualWeight: 8.96, targetWeight: 8.00, drift: 0.96 }
      };
      const stepNames = [&#x27;Portfolio Horizon&#x27;, &#x27;Manager contribution horizon&#x27;, &#x27;Selected manager horizon&#x27;];
      let step = 0;
      let selected = &#x27;a&#x27;;

      function formatSigned(value, digits = 2) {
        return `${value &gt;= 0 ? &#x27;+&#x27; : &#x27;&#x27;}${value.toFixed(digits)}`;
      }

      function setFill(element, value, scale) {
        const width = Math.min(45, Math.abs(value) / scale * 45);
        element.style.setProperty(&#x27;--width&#x27;, `${width}%`);
        element.classList.toggle(&#x27;is-positive&#x27;, value &gt;= 0);
        element.classList.toggle(&#x27;is-negative&#x27;, value &lt; 0);
      }

      function clearDetail() {
        detailLine.textContent = &#x27;&#x27;;
        detailLine.hidden = true;
      }

      function updateManager() {
        const manager = managers[selected];
        const toleranceMargin = 3 - Math.abs(manager.drift);
        root.querySelector(&#x27;[data-manager-name]&#x27;).textContent = manager.name;
        root.querySelector(&#x27;[data-manager-role]&#x27;).textContent = manager.role;
        const responsibility = toleranceMargin &gt;= 0
          ? &#x27;The manager exceeded its mandate and remains within the advisor’s allocation tolerance.&#x27;
          : &#x27;The manager exceeded its mandate; the advisor’s allocation to the manager is outside tolerance and requires review.&#x27;;
        root.querySelector(&#x27;[data-responsibility]&#x27;).textContent = responsibility;
        root.querySelector(&#x27;[data-active-label]&#x27;).textContent = `Mandate performance · ${formatSigned(manager.active)} pp`;
        root.querySelector(&#x27;[data-active-values]&#x27;).textContent = `${manager.actual.toFixed(1)}% actual · ${manager.mandate.toFixed(1)}% mandate`;
        root.querySelector(&#x27;[data-contribution-label]&#x27;).textContent = `Portfolio contribution · ${formatSigned(manager.contribution)} pp`;
        root.querySelector(&#x27;[data-allocation-label]&#x27;).textContent = toleranceMargin &gt;= 0
          ? `Advisor allocation · ${toleranceMargin.toFixed(2)} pp inside tolerance`
          : `Advisor allocation · ${Math.abs(toleranceMargin).toFixed(2)} pp outside tolerance`;
        root.querySelector(&#x27;[data-allocation-values]&#x27;).textContent = `${manager.actualWeight.toFixed(2)}% actual · ${manager.targetWeight.toFixed(1)}% target`;
        setFill(root.querySelector(&#x27;[data-active-fill]&#x27;), manager.active, 3);
        setFill(root.querySelector(&#x27;[data-contribution-fill]&#x27;), manager.contribution, 0.6);
        setFill(root.querySelector(&#x27;[data-allocation-fill]&#x27;), toleranceMargin, 3);
        root.querySelector(&#x27;[data-manager-summary]&#x27;).setAttribute(&#x27;aria-label&#x27;, `${manager.name} return was ${manager.active.toFixed(2)} percentage points above mandate, portfolio contribution was positive ${manager.contribution.toFixed(2)} percentage points, and advisor allocation was ${toleranceMargin &gt;= 0 ? &#x27;within&#x27; : &#x27;outside&#x27;} tolerance by ${Math.abs(toleranceMargin).toFixed(2)} percentage points.`);
        root.querySelectorAll(&#x27;[data-manager-row]&#x27;).forEach((row) =&gt; row.classList.toggle(&#x27;is-selected&#x27;, row.dataset.managerRow === selected));
        if (step === 1) nextButton.textContent = `Open ${manager.name} horizon`;
      }

      function render() {
        screens.forEach((screen) =&gt; { screen.hidden = Number(screen.dataset.step) !== step; });
        progress.textContent = `${step + 1} of 3 · ${stepNames[step]}`;
        prevButton.disabled = step === 0;
        nextButton.textContent = step === 0 ? &#x27;See manager contributions&#x27; : step === 1 ? `Open ${managers[selected].name} horizon` : &#x27;Return to portfolio&#x27;;
        clearDetail();
        updateManager();
      }

      select.addEventListener(&#x27;change&#x27;, () =&gt; {
        selected = select.value;
        updateManager();
        clearDetail();
      });

      prevButton.addEventListener(&#x27;click&#x27;, () =&gt; {
        if (step &gt; 0) {
          step -= 1;
          render();
        }
      });

      nextButton.addEventListener(&#x27;click&#x27;, () =&gt; {
        if (step &lt; 2) {
          step += 1;
        } else {
          step = 0;
        }
        render();
      });

      root.querySelector(&#x27;[data-explain]&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        detailLine.textContent = root.querySelector(&#x27;[data-responsibility]&#x27;).textContent;
        detailLine.hidden = false;
      });

      root.querySelector(&#x27;[data-verify]&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        const manager = managers[selected];
        detailLine.textContent = `${manager.actual.toFixed(1)}% actual return − ${manager.mandate.toFixed(1)}% mandate = ${formatSigned(manager.active)} pp; ${manager.actualWeight.toFixed(2)}% actual weight versus ${manager.targetWeight.toFixed(1)}% target.`;
        detailLine.hidden = false;
      });

      render();
    })();

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
