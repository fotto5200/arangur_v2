services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: "${APP_ENV:-private_demo}"
      PUBLIC_ORIGIN: "${PUBLIC_ORIGIN:-http://127.0.0.1:8000}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://127.0.0.1:8000,http://localhost:8000}"
      DB_ENGINE: "${DB_ENGINE:-postgres}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://arangur_demo:change_me_demo_only@postgres:5432/arangur_demo}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-arangur_demo}"
      POSTGRES_USER: "${POSTGRES_USER:-arangur_demo}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change_me_demo_only}"
    volumes:
      - arangur_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-arangur_demo}\" -d \"${POSTGRES_DB:-arangur_demo}\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  arangur_postgres_data:
