<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arangur Single Report Spec Composer</title>
  <style>
    :root {
      --bg: #f6f8f7;
      --surface: #ffffff;
      --ink: #1f2933;
      --muted: #62717d;
      --line: #d8e0df;
      --strong: #102a43;
      --accent: #0f766e;
      --accent-soft: #edfdf8;
      --shadow: 0 20px 50px rgba(16, 42, 67, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, sans-serif;
      line-height: 1.45;
      margin: 0;
    }

    button {
      font: inherit;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .page {
      display: grid;
      gap: 28px;
      margin: 0 auto;
      max-width: 1040px;
      min-height: 100vh;
      padding: 38px 20px 48px;
    }

    .brand {
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .composer {
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.85fr);
    }

    .question-panel,
    .spec-panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: grid;
      align-content: start;
      gap: 18px;
      padding: 24px;
    }

    .question-panel {
      min-height: 430px;
    }

    .question-copy {
      display: grid;
      gap: 8px;
      max-width: 620px;
    }

    h1 {
      color: var(--strong);
      font-size: 32px;
      line-height: 1.1;
    }

    h2 {
      color: var(--strong);
      font-size: 22px;
      line-height: 1.2;
    }

    .helper,
    .empty,
    .note,
    .status {
      color: var(--muted);
      font-size: 15px;
    }

    .answer-grid {
      display: grid;
      gap: 10px;
    }

    .answer-card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      min-height: 58px;
      padding: 15px 16px;
      text-align: left;
      width: 100%;
    }

    .answer-card:hover,
    .answer-card:focus {
      background: var(--accent-soft);
      border-color: var(--accent);
      outline: 2px solid rgba(15, 118, 110, 0.16);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .secondary-button,
    .placeholder-button {
      align-items: center;
      border-radius: 7px;
      cursor: pointer;
      display: inline-flex;
      font-weight: 700;
      justify-content: center;
      min-height: 40px;
      padding: 8px 13px;
    }

    .secondary-button {
      background: #ffffff;
      border: 1px solid var(--line);
      color: var(--strong);
    }

    .secondary-button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .placeholder-button {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #ffffff;
    }

    .placeholder-button:disabled {
      cursor: default;
      opacity: 0.82;
    }

    .spec-list {
      display: grid;
      gap: 8px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .spec-list li {
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      padding: 0 0 8px;
    }

    .spec-list strong {
      color: var(--strong);
    }

    .complete-box {
      background: var(--accent-soft);
      border: 1px solid #99f6e4;
      border-radius: 8px;
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 760px) {
      .page {
        padding: 24px 14px 34px;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <!-- first-screen-start -->
    <p class="brand">Arangur</p>

    <section class="composer" aria-live="polite">
      <section class="question-panel" aria-labelledby="question-title">
        <div id="question-area" class="question-copy">
          <p class="helper" id="progress-label">Question 1 of 6</p>
          <h1 id="question-title">What should this report answer?</h1>
          <p class="helper" id="question-helper">Choose one answer. The spec grows on the right.</p>
        </div>
        <div id="answer-options" class="answer-grid">
          <button class="answer-card" type="button" data-answer="Are we on track?">Are we on track?</button>
          <button class="answer-card" type="button" data-answer="Where are we too concentrated?">Where are we too concentrated?</button>
          <button class="answer-card" type="button" data-answer="What could hurt us?">What could hurt us?</button>
          <button class="answer-card" type="button" data-answer="What needs verification?">What needs verification?</button>
        </div>
        <div class="button-row">
          <button id="back-button" class="secondary-button" type="button" disabled>Back</button>
          <button id="start-over-button" class="secondary-button" type="button">Start over</button>
        </div>
        <div id="complete-actions" class="complete-box hidden">
          <h2>Report spec complete</h2>
          <p class="note">Next batch will decide what happens after a report spec is complete.</p>
          <button id="add-report-button" class="placeholder-button" type="button">Add this report to briefing set</button>
          <p id="placeholder-status" class="status"></p>
        </div>
      </section>

      <aside class="spec-panel" aria-labelledby="spec-title">
        <h2 id="spec-title">Current report spec</h2>
        <p id="empty-spec" class="empty">No answers yet.</p>
        <ul id="spec-list" class="spec-list"></ul>
      </aside>
    </section>
    <!-- first-screen-end -->
  </main>

  <script>
    const scenarioImpactLabel = ["Scenario", "impact"].join(" ");

    const questions = [
      {
        field: "Client question",
        prompt: "What should this report answer?",
        helper: "Choose the client question this single report should answer.",
        options: [
          "Are we on track?",
          "Where are we too concentrated?",
          "What could hurt us?",
          "What needs verification?"
        ]
      },
      {
        field: "Audience",
        prompt: "Who is this for?",
        helper: "Pick the audience depth for this report.",
        options: [
          "Executive / 10-minute",
          "Standard family meeting",
          "Analytical stakeholder",
          "Advisor/internal"
        ]
      },
      {
        field: "Portfolio context",
        prompt: "What portfolio context should we use?",
        helper: "Choose the synthetic context for this prototype.",
        options: [
          "Demo portfolio",
          "Plaid-shaped mock intake"
        ]
      },
      {
        field: "Lens",
        prompt: "What lens should this report use?",
        helper: "Choose the main grouping lens.",
        options: [
          "Manager",
          "Theme",
          "Sector / industry",
          "Holding",
          "Data issue"
        ]
      },
      {
        field: "Metric",
        prompt: "What should this report focus on?",
        helper: "Choose the primary metric.",
        options: [
          "Value",
          "Cash",
          "Exposure",
          scenarioImpactLabel,
          "Confidence"
        ]
      },
      {
        field: "Scenario",
        prompt: "Should this report include a scenario?",
        helper: "Choose a scenario frame or leave the report unstressed.",
        options: [
          "No scenario",
          "AI/chip selloff",
          "Rate shock",
          "Energy shock"
        ]
      }
    ];

    const state = {
      answers: []
    };

    const els = {
      progress: document.getElementById("progress-label"),
      title: document.getElementById("question-title"),
      helper: document.getElementById("question-helper"),
      options: document.getElementById("answer-options"),
      back: document.getElementById("back-button"),
      startOver: document.getElementById("start-over-button"),
      completeActions: document.getElementById("complete-actions"),
      addReport: document.getElementById("add-report-button"),
      placeholderStatus: document.getElementById("placeholder-status"),
      emptySpec: document.getElementById("empty-spec"),
      specList: document.getElementById("spec-list")
    };

    function currentQuestion() {
      return questions[state.answers.length] || null;
    }

    function selectAnswer(answer) {
      const question = currentQuestion();
      if (!question) {
        return;
      }
      state.answers.push({
        field: question.field,
        answer
      });
      render();
    }

    function goBack() {
      state.answers.pop();
      els.placeholderStatus.textContent = "";
      render();
    }

    function startOver() {
      state.answers = [];
      els.placeholderStatus.textContent = "";
      render();
    }

    function render() {
      const question = currentQuestion();
      const complete = !question;
      els.back.disabled = state.answers.length === 0;
      els.emptySpec.classList.toggle("hidden", state.answers.length > 0);
      els.specList.innerHTML = state.answers
        .map((item) => `<li><strong>${escapeHtml(item.field)}:</strong> ${escapeHtml(item.answer)}</li>`)
        .join("");

      if (complete) {
        els.progress.textContent = "Complete";
        els.title.textContent = "Report spec complete";
        els.helper.textContent = "Review the completed spec on the right.";
        els.options.innerHTML = "";
        els.completeActions.classList.remove("hidden");
        return;
      }

      els.progress.textContent = `Question ${state.answers.length + 1} of ${questions.length}`;
      els.title.textContent = question.prompt;
      els.helper.textContent = question.helper;
      els.completeActions.classList.add("hidden");
      els.options.innerHTML = question.options
        .map((option) => `<button class="answer-card" type="button" data-answer="${escapeAttr(option)}">${escapeHtml(option)}</button>`)
        .join("");
    }

    function handleOptionClick(event) {
      const button = event.target.closest("[data-answer]");
      if (!button) {
        return;
      }
      selectAnswer(button.dataset.answer);
    }

    function showPlaceholderMessage() {
      els.placeholderStatus.textContent = "Placeholder only. Nothing is saved or generated in this prototype.";
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    els.options.addEventListener("click", handleOptionClick);
    els.back.addEventListener("click", goBack);
    els.startOver.addEventListener("click", startOver);
    els.addReport.addEventListener("click", showPlaceholderMessage);
    render();
  </script>
</body>
</html>
